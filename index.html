<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Elite 2026 | Smart Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161c2d; --primary: #38bdf8; --success: #4ade80; --danger: #f87171; --text: #f8fafc; --accent: #818cf8; --gold: #fde047; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .container { max-width: 450px; margin: auto; }
        
        /* Header & Stats */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #2d3748; margin-bottom: 15px; }
        .days-box { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; }

        /* Game Center Grid */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .game-card { background: var(--card); border-radius: 20px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #ffffff10; cursor: pointer; transition: 0.3s; }
        .game-card:active { transform: scale(0.95); }
        .game-icon { font-size: 2.2em; filter: drop-shadow(0 0 10px var(--primary)); }

        /* Friend Cards */
        .card { background: var(--card); padding: 16px; margin-bottom: 12px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        .btn-add { background: var(--primary); color: white; padding: 10px 15px; border-radius: 12px; border:none; font-weight:600; cursor:pointer; }
        .btn-custom { background: var(--accent); color: white; padding: 10px 15px; border-radius: 12px; border:none; margin-left:5px; cursor:pointer; }
        
        /* Modals & Games */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .wheel-box { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        .wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #334155; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(var(--danger) 0% 25%, var(--primary) 25% 50%, var(--success) 50% 75%, var(--gold) 75% 100%); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid white; z-index: 10; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 85%; }
        .m-card { height: 130px; background: #1e1b4b; border-radius: 15px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 2em; cursor: pointer; transition: 0.6s; transform-style: preserve-3d; }
        .m-card.flip { transform: rotateY(180deg); background: var(--success); }

        .btn-share { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: #25D366; color: white; padding: 15px; border-radius: 15px; border:none; font-weight:bold; z-index:100; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">🚢 Mumbai Live</h2>
        <button onclick="checkPass('settings')" style="background:#1e293b; color:white; border-radius:12px; padding:8px 12px; border:1px solid #334155;">⚙️ Admin</button>
    </div>

    <div class="days-box">
        <span style="font-size: 2.2em; font-weight: 800; color: var(--primary);" id="days-left">0</span><br>
        <span style="opacity: 0.6; text-transform: uppercase; font-size: 0.7em;">Days till Diwali</span>
    </div>

    <div class="stat-card">
        <small style="opacity:0.6; letter-spacing:1px;">TOTAL SAVINGS</small>
        <span id="total-val" style="display:block; font-size:2em; font-weight:bold; color:var(--primary);">₹0</span>
    </div>

    <div class="game-grid">
        <div class="game-card" onclick="openModal('spinModal')"><span class="game-icon">🎡</span><b>LUCKY SPIN</b></div>
        <div class="game-card" onclick="openModal('cardModal')"><span class="game-icon">🃏</span><b>MYSTERY CARD</b></div>
    </div>

    <button style="background:var(--success); color:white; width:100%; padding:15px; border-radius:15px; border:none; font-weight:bold; margin-bottom:20px;" onclick="checkPass('found')">✨ Add Group Fund</button>
    
    <div id="friend-list"></div>

    <canvas id="chart" style="margin-top:20px; background:var(--card); border-radius:20px; padding:15px; border:1px solid #2d3748;"></canvas>

    <div style="text-align:center; margin-top:20px;">
        <button style="background:none; color:var(--primary); border:none;" onclick="openModal('historyModal')">📜 View History</button>
    </div>
</div>

<div class="modal" id="spinModal">
    <h2 style="color:var(--primary)">LUCKY WHEEL</h2>
    <div class="wheel-box"><div class="pointer"></div><div class="wheel-canvas" id="wheel"></div></div>
    <button class="btn-add" style="width:200px; padding:15px;" onclick="startSpin()">SPIN NOW</button>
    <button onclick="closeModal('spinModal')" style="background:none; color:gray; border:none; margin-top:20px;">CLOSE</button>
</div>

<div class="modal" id="cardModal">
    <h2 style="color:var(--accent)">CHOOSE 1 OF 4</h2>
    <div class="card-grid">
        <div class="m-card" onclick="flip(this)">❓</div><div class="m-card" onclick="flip(this)">❓</div>
        <div class="m-card" onclick="flip(this)">❓</div><div class="m-card" onclick="flip(this)">❓</div>
    </div>
    <button onclick="closeModal('cardModal')" style="background:none; color:gray; border:none; margin-top:20px;">CLOSE</button>
</div>

<div class="modal" id="historyModal">
    <div style="background:var(--card); padding:25px; border-radius:24px; width:80%; max-height:70vh; overflow-y:auto; border:1px solid #334155;">
        <h3>Activity History</h3>
        <div id="history-list"></div>
        <button class="btn-add" style="width:100%; margin-top:15px;" onclick="closeModal('historyModal')">Close</button>
    </div>
</div>

<button class="btn-share" onclick="whatsappShare()">📲 Share Live Status</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzJwspa9tNV3D2mPwxN7JNRFmI0SbjKE9-VltIBKznochvAK59QADkbweQXEWyUezgS0w/exec";
const ADMIN_PASS = "1234";
const START = new Date("March 24, 2026");
const DIWALI = new Date("November 8, 2026");

let data = { friends: [{name:"Munib", paid:0},{name:"Nadim", paid:0},{name:"Ruhan", paid:0}], groupExtra: 0, dailyGoal: 20, history: [] };
let isAdmin = localStorage.getItem('isMumbaiAdmin') === 'true';

async function sync() {
    try {
        const res = await fetch(API_URL);
        const cloud = await res.json();
        if(cloud.friends) data = cloud;
        render();
    } catch(e) { render(); }
}

function render() {
    const today = new Date();
    const should = getDays(START, today > START ? today : START) * data.dailyGoal;
    const total = data.friends.reduce((s,f)=>s+f.paid, 0) + data.groupExtra;
    
    document.getElementById('days-left').innerText = getDays(today, DIWALI);
    document.getElementById('total-val').innerText = "₹" + total.toLocaleString();

    let html = "";
    data.friends.forEach((f, i) => {
        const diff = f.paid - should;
        const color = diff < 0 ? 'var(--danger)' : 'var(--success)';
        html += `<div class="card">
            <div><b>${f.name}</b><br><small style="color:${color}">${diff<0?'Owes':'Extra'} ₹${Math.abs(diff)}</small></div>
            <div>
                <button class="btn-add" onclick="checkPass('add',${i})">+₹20</button>
                <button class="btn-custom" onclick="checkPass('custom',${i})">➕</button>
            </div>
        </div>`;
    });
    document.getElementById('friend-list').innerHTML = html;
    document.getElementById('history-list').innerHTML = data.history.map(h => `<div style="font-size:0.8em; padding:5px 0; border-bottom:1px solid #334155;">${h.msg} <br><small style="opacity:0.5">${h.time}</small></div>`).join('');
    drawChart();
}

function getDays(f, t) {
    let count = 0, cur = new Date(f);
    while(cur <= t) { if(cur.getDay()!==0) count++; cur.setDate(cur.getDate()+1); }
    return count;
}

function startSpin() {
    const deg = 1800 + Math.floor(Math.random()*360);
    document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
    setTimeout(() => { alert("Spin Done! Use Custom button to add winnings."); }, 4000);
}

function flip(el) {
    if(el.classList.contains('flip')) return;
    el.classList.add('flip'); el.innerHTML = "₹50";
    setTimeout(() => { alert("Add ₹50 bonus manually!"); closeModal('cardModal'); el.classList.remove('flip'); el.innerHTML="❓"; }, 800);
}

function checkPass(act, i) {
    if(isAdmin) { execute(act, i); return; }
    let p = prompt("Admin Pass:");
    if(p===ADMIN_PASS) { isAdmin=true; localStorage.setItem('isMumbaiAdmin','true'); execute(act, i); }
}

function execute(act, i) {
    if(act==='add') updateMoney(i, data.dailyGoal);
    if(act==='custom') { let v=prompt("Amount?"); if(v) updateMoney(i, Number(v)); }
    if(act==='found') { let v=prompt("Found?"); if(v) { data.groupExtra+=Number(v); log(`✨ Fund +₹${v}`); save(); } }
}

function updateMoney(i, amt) {
    data.friends[i].paid += amt;
    log(`${data.friends[i].name} +₹${amt}`);
    save();
}

function log(msg) {
    data.history.unshift({msg, time: new Date().toLocaleTimeString()});
    if(data.history.length > 15) data.history.pop();
}

async function save() { render(); await fetch(API_URL, {method:'POST', body:JSON.stringify(data)}); }

function whatsappShare() {
    let text = `🚢 *MUMBAI TRIP LIVE*\nTotal: ₹${document.getElementById('total-val').innerText}\n`;
    data.friends.forEach(f => text += `👤 ${f.name}: ₹${f.paid}\n`);
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
}

function drawChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(window.mChart) window.mChart.destroy();
    window.mChart = new Chart(ctx, { type:'bar', data:{ labels:data.friends.map(f=>f.name), datasets:[{data:data.friends.map(f=>f.paid), backgroundColor:'#38bdf8'}] }, options:{ plugins:{legend:{display:false}}, scales:{y:{grid:{color:'#1e293b'}}} } });
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

sync();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Elite 2026</title>
    <style>
        :root { --bg: #050810; --card: #111827; --primary: #00d2ff; --accent: #9d50bb; --success: #00ff87; --danger: #ff416c; --text: #ffffff; --gold: #fde047; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        
        /* Stats & Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #ffffff10; text-align: center; position: relative; }
        .stat-card h2 { margin: 5px 0; color: var(--primary); font-size: 1.6em; }
        .exp-tag { position: absolute; top: 0; right: 0; background: var(--accent); font-size: 0.6em; padding: 4px 8px; border-bottom-left-radius: 10px; font-weight: bold; }

        /* Game Hub */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .game-btn { background: linear-gradient(145deg, #1e293b, #0f172a); border-radius: 20px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #ffffff10; cursor: pointer; transition: 0.3s; }
        .game-btn:active { transform: scale(0.95); }
        .game-btn.wide { grid-column: span 2; height: 80px; flex-direction: row; gap: 15px; }
        .game-icon { font-size: 2.2em; filter: drop-shadow(0 0 8px var(--primary)); }

        /* Buttons */
        .btn-fund { background: var(--success); color: #000; width: 100%; padding: 14px; border-radius: 15px; margin-bottom: 15px; font-weight: 800; border:none; cursor: pointer; }
        .btn-action { padding: 8px 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 0.8em; margin-left: 5px; }
        .btn-plus { background: var(--primary); }
        .btn-custom { background: var(--accent); }

        /* Friend Cards */
        .friend-card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #ffffff10; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { font-size: 0.7em; padding: 3px 8px; border-radius: 6px; font-weight: bold; margin-top: 5px; display: inline-block; }

        /* Modal & Games */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 1000; align-items: center; justify-content: center; }
        .wheel-box { position: relative; width: 260px; height: 260px; margin: 20px auto; }
        .wheel-canvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #334155; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(var(--danger) 0% 25%, var(--primary) 25% 50%, var(--success) 50% 75%, var(--gold) 75% 100%); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid white; z-index: 10; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; width: 85%; }
        .m-card { height: 130px; background: #312e81; border-radius: 15px; border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-size: 2em; cursor: pointer; transition: 0.6s; transform-style: preserve-3d; }
        .m-card.flip { transform: rotateY(180deg); background: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; background:linear-gradient(to right, #00d2ff, #9d50bb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MUMBAI ELITE 2026</h2>
        <button onclick="checkPass('settings')" style="background:none; border:none; font-size:1.5em; cursor:pointer;">⚙️</button>
    </div>

    <div class="main-stats">
        <div class="stat-card">
            <div class="exp-tag" id="exp-tag">EXP: ₹0</div>
            <small>SAVED TOTAL</small><h2 id="total-val">₹0</h2>
        </div>
        <div class="stat-card"><small>DAYS LEFT</small><h2 id="days-left">0</h2></div>
    </div>

    <div class="game-grid">
        <div class="game-btn" onclick="openModal('spinModal')"><span class="game-icon">🎡</span><b>SPIN</b></div>
        <div class="game-btn" onclick="openModal('cardModal')"><span class="game-icon">🃏</span><b>CARDS</b></div>
        <div class="game-btn wide" onclick="alert('Board Logic Syncing...')"><span class="game-icon">🐍</span><b>SNAKE & LADDERS</b></div>
    </div>

    <button class="btn-fund" onclick="checkPass('found')">✨ ADD GROUP FOUND FUND</button>
    <div id="friend-list"></div>
</div>

<div class="modal" id="spinModal">
    <h2 style="color:var(--primary)">LUCKY SPIN</h2>
    <div class="wheel-box"><div class="pointer"></div><div class="wheel-canvas" id="wheel"></div></div>
    <button class="btn-fund" style="width:200px" onclick="startSpin()">SPIN</button>
    <button onclick="closeModal('spinModal')" style="color:gray; background:none; border:none;">CLOSE</button>
</div>

<div class="modal" id="cardModal">
    <h2 style="color:var(--accent)">PICK 1 OF 4</h2>
    <div class="card-grid">
        <div class="m-card" onclick="flip(this)">❓</div><div class="m-card" onclick="flip(this)">❓</div>
        <div class="m-card" onclick="flip(this)">❓</div><div class="m-card" onclick="flip(this)">❓</div>
    </div>
    <button onclick="closeModal('cardModal')" style="color:gray; background:none; border:none; margin-top:20px;">CLOSE</button>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_URL"; // Replace with your URL
const ADMIN_PASS = "1234";
const START_DATE = new Date("2026-03-24");

let state = { friends: [
    {name: "Munib", paid: 360}, {name: "Nadim", paid: 200}, 
    {name: "Ruhan", paid: 220}, {name: "Friend 4", paid: 0}
], groupExtra: 0, dailyGoal: 20 };

async function sync() {
    try {
        const res = await fetch(API_URL);
        const cloud = await res.json();
        if(cloud.friends) state = cloud;
        render();
    } catch(e) { render(); }
}

function render() {
    const exp = getExpected();
    const total = state.friends.reduce((s,f) => s + (f.paid || 0), 0) + (state.groupExtra || 0);
    document.getElementById('total-val').innerText = "₹" + total;
    document.getElementById('exp-tag').innerText = "EXP: ₹" + exp;
    
    const diffDays = Math.max(0, Math.floor((new Date("2026-11-08") - new Date())/(1000*60*60*24)));
    document.getElementById('days-left').innerText = diffDays;

    let html = "";
    state.friends.forEach((f, i) => {
        const diff = (f.paid || 0) - exp;
        const color = diff < 0 ? 'var(--danger)' : 'var(--success)';
        html += `<div class="friend-card">
            <div>
                <b>${f.name}</b><br>
                <span class="status-tag" style="background:${color}33; color:${color}">${diff < 0 ? 'Owes' : 'Extra'} ₹${Math.abs(diff)}</span>
            </div>
            <div style="text-align:right;">
                <b style="color:var(--primary); font-size:1.2em;">₹${f.paid || 0}</b>
                <div style="margin-top:8px;">
                    <button class="btn-action btn-plus" onclick="checkPass('add', ${i})">+₹${state.dailyGoal}</button>
                    <button class="btn-action btn-custom" onclick="checkPass('custom', ${i})">➕</button>
                </div>
            </div>
        </div>`;
    });
    document.getElementById('friend-list').innerHTML = html + `
        <div class="friend-card" style="border:1px dashed var(--success); opacity:0.8;">
            <b>✨ Group Found Fund</b><b style="color:var(--success)">₹${state.groupExtra || 0}</b>
        </div>`;
}

function getExpected() {
    let count = 0, cur = new Date(START_DATE), today = new Date();
    while(cur <= today) { if(cur.getDay() !== 0) count++; cur.setDate(cur.getDate() + 1); }
    return count * (state.dailyGoal || 20);
}

function startSpin() {
    const deg = 1800 + Math.floor(Math.random() * 360);
    document.getElementById('wheel').style.transform = `rotate(${deg}deg)`;
    setTimeout(() => { alert("Spin Complete! Add winnings via Custom button."); }, 4000);
}

function flip(el) {
    if(el.classList.contains('flip')) return;
    el.classList.add('flip'); el.innerHTML = "₹50";
    setTimeout(() => { alert("Add ₹50 via Custom button!"); closeModal('cardModal'); el.classList.remove('flip'); el.innerHTML="❓"; }, 800);
}

function checkPass(act, idx) {
    const p = prompt("Pass:");
    if(p === ADMIN_PASS) {
        if(act === 'add') { state.friends[idx].paid += state.dailyGoal; save(); }
        if(act === 'custom') { let a = prompt("Amount?"); if(a) { state.friends[idx].paid += Number(a); save(); } }
        if(act === 'found') { let a = prompt("Found Amount?"); if(a) { state.groupExtra += Number(a); save(); } }
    }
}

async function save() {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(state) });
    render();
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

sync();
</script>
</body>
</html>

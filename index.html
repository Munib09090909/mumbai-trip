<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Trip Saver</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --success: #4ade80; --accent: #f59e0b; --danger: #ef4444; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 500px; margin: auto; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid #334155; margin-bottom: 10px; }
        .stat-val { font-size: 1.4em; font-weight: bold; display: block; color: var(--primary); }
        .label { font-size: 0.7em; text-transform: uppercase; opacity: 0.6; letter-spacing: 1px; }
        .card { background: var(--card); padding: 15px; margin-bottom: 10px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; margin: 5px 0; font-size: 16px; }
        button { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; background: var(--primary); color: white; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .history-box { background: var(--card); border-radius: 16px; padding: 15px; margin-top: 20px; max-height: 200px; overflow-y: auto; border: 1px solid #334155; font-size: 0.85em; }
        .history-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">🚢 Mumbai Trip 2026</h2>
    
    <div class="stat-card">
        <span class="stat-val" id="days-left">0</span>
        <span class="label">Saving Days Left (No Sundays)</span>
    </div>

    <div class="card" style="display: block; border-color: var(--accent);">
        <span class="label" style="color: var(--accent);">Daily Saving Goal per Friend</span>
        <input type="number" id="daily-target" value="20" oninput="update()">
        <div style="margin-top: 10px; display: flex; justify-content: space-between;">
            <span class="label">Expected Total:</span>
            <b id="expected-val" style="color: var(--success);">₹0</b>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="stat-card"><span class="stat-val" id="total-val">₹0</span><span class="label">Current Saved</span></div>
        <div class="stat-card"><span class="stat-val" id="group-val">₹0</span><span class="label">Group Fund</span></div>
    </div>

    <button onclick="addFound()" style="background:var(--success); width:100%; margin-bottom: 10px;">✨ Add Found Money</button>

    <div id="friend-list"></div>

    <canvas id="chart" style="margin-top:20px; background:var(--card); border-radius:16px; padding:10px;"></canvas>

    <div class="history-box">
        <b class="label">Saving History</b>
        <div id="history-list" style="margin-top:10px;"></div>
    </div>

    <button onclick="resetData()" style="background:none; color:var(--danger); width:100%; margin-top:20px; font-size:0.7em; border: 1px solid var(--danger);">Reset All Progress</button>
</div>

<script>
// CONFIG
const DIWALI = new Date("November 8, 2026");
const START = new Date("March 24, 2026");
const NAMES = ["Munib", "Nadim", "Ruhan", "Saeid", "Sahil"];

// LOAD DATA
let savings = JSON.parse(localStorage.getItem('mumbai_v3_savings')) || [0, 0, 0, 0, 0];
let groupFund = Number(localStorage.getItem('mumbai_v3_group')) || 0;
let historyLog = JSON.parse(localStorage.getItem('mumbai_v3_history')) || [];

function getDays(from, to) {
    let count = 0;
    let cur = new Date(from);
    while (cur <= to) {
        if (cur.getDay() !== 0) count++;
        cur.setDate(cur.getDate() + 1);
    }
    return count;
}

function update() {
    const daily = Number(document.getElementById('daily-target').value) || 0;
    const totalDays = getDays(START, DIWALI);
    const expected = (totalDays * daily * 5) + groupFund;
    
    const today = new Date();
    const daysLeft = getDays(today > START ? today : START, DIWALI);
    const currentSaved = savings.reduce((a, b) => a + b, 0) + groupFund;

    // Update UI
    document.getElementById('days-left').innerText = daysLeft;
    document.getElementById('expected-val').innerText = "₹" + expected.toLocaleString();
    document.getElementById('total-val').innerText = "₹" + currentSaved.toLocaleString();
    document.getElementById('group-val').innerText = "₹" + groupFund;

    let html = "";
    NAMES.forEach((name, i) => {
        html += `<div class="card">
            <div><b>${name}</b><br><span style="color:var(--success)">₹${savings[i]}</span></div>
            <button onclick="add(${i})">+₹${daily}</button>
        </div>`;
    });
    document.getElementById('friend-list').innerHTML = html;

    // History
    document.getElementById('history-list').innerHTML = historyLog.map(h => `
        <div class="history-item"><span>${h.msg}</span><span style="opacity:0.5">${h.time}</span></div>
    `).join('') || '<div style="text-align:center; opacity:0.3;">No history yet</div>';

    save();
    drawChart();
}

function add(i) {
    const amt = Number(document.getElementById('daily-target').value);
    savings[i] += amt;
    log(`${NAMES[i]} added ₹${amt}`);
    update();
}

function addFound() {
    let a = prompt("Amount found?");
    if(a && !isNaN(a)) {
        groupFund += Number(a);
        log(`✨ Found ₹${a} for Group Fund`);
        update();
    }
}

function log(msg) {
    const now = new Date().toLocaleDateString('en-IN', {day:'numeric', month:'short'});
    historyLog.unshift({ msg, time: now });
    if(historyLog.length > 15) historyLog.pop();
}

function save() {
    localStorage.setItem('mumbai_v3_savings', JSON.stringify(savings));
    localStorage.setItem('mumbai_v3_group', groupFund);
    localStorage.setItem('mumbai_v3_history', JSON.stringify(historyLog));
}

function resetData() {
    if(confirm("Are you sure? This will delete all your savings and history!")) {
        savings=[0,0,0,0,0]; groupFund=0; historyLog=[]; save(); update();
    }
}

function drawChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if (window.mChart) window.mChart.destroy();
    window.mChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: NAMES,
            datasets: [{ label: 'Savings', data: savings, backgroundColor: '#38bdf8', borderRadius: 6 }]
        },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { color: '#334155'} } } }
    });
}

update();
</script>
</body>
</html>

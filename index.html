<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Trip | Group Sync</title>
    <style>
        :root { --bg: #0b0e14; --card: #1c222d; --primary: #38bdf8; --accent: #818cf8; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; }
        .container { max-width: 420px; margin: auto; }
        
        /* Header & Actions */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-btns { display: flex; gap: 8px; }
        
        /* Stats */
        .main-stat { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; border-radius: 24px; text-align: center; border: 1px solid #334155; margin-bottom: 20px; }
        .total-amt { font-size: 2.5em; font-weight: 800; color: var(--primary); display: block; }
        
        /* Calculation Tool */
        .calc-box { background: var(--accent); color: white; padding: 15px; border-radius: 18px; margin-bottom: 20px; cursor: pointer; text-align: center; font-weight: bold; box-shadow: 0 4px 15px rgba(129, 140, 248, 0.3); }

        /* Friend Cards */
        .friend-card { background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        .friend-meta b { font-size: 1.1em; display: block; margin-bottom: 4px; }
        .btn-group { display: flex; gap: 6px; }
        
        .btn { border: none; padding: 10px 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-add { background: #334155; color: var(--primary); border: 1px solid var(--primary); }
        .btn-custom { background: var(--primary); color: #000; }
        .btn-ghost { background: transparent; border: 1px solid #475569; color: #94a3b8; font-size: 0.8em; }

        .history-box { background: #00000055; border-radius: 15px; padding: 15px; font-size: 0.85em; max-height: 120px; overflow-y: auto; color: #94a3b8; border: 1px solid #1e293b; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">🚢 Mumbai 2026</h2>
        <div class="top-btns">
            <button class="btn btn-ghost" onclick="exportData()">💾 Backup</button>
            <label class="btn btn-ghost">📂 Import <input type="file" onchange="importData(event)"></label>
        </div>
    </div>

    <div class="main-stat">
        <small style="text-transform: uppercase; letter-spacing: 1px; opacity: 0.7;">Total Group Savings</small>
        <span class="total-amt" id="total-val">₹0</span>
    </div>

    <div class="calc-box" onclick="runFutureCalc()">
        🔮 Future Savings Calculator
    </div>

    <div id="friend-list"></div>

    <div style="margin-top: 25px;">
        <h4 style="margin: 0 0 10px 5px;">📜 Recent Activity</h4>
        <div class="history-box" id="logs"></div>
    </div>

    <button class="btn btn-custom" style="width:100%; margin-top:20px; padding:15px;" onclick="logExpense()">💸 Record Trip Expense</button>
</div>

<script>
    let state = JSON.parse(localStorage.getItem('mumbaiTripDataV4')) || {
        friends: [
            { name: "Munib", paid: 0 },
            { name: "Friend 2", paid: 0 },
            { name: "Friend 3", paid: 0 },
            { name: "Friend 4", paid: 0 }
        ],
        spent: 0,
        logs: []
    };

    function render() {
        const total = state.friends.reduce((acc, f) => acc + f.paid, 0);
        document.getElementById('total-val').innerText = "₹" + total.toLocaleString();

        let html = "";
        state.friends.forEach((f, i) => {
            html += `
            <div class="friend-card">
                <div class="friend-meta">
                    <b>${f.name}</b>
                    <small style="color:#94a3b8">Saved: ₹${f.paid}</small>
                </div>
                <div class="btn-group">
                    <button class="btn btn-add" onclick="addMoney(${i}, 30)">+30</button>
                    <button class="btn btn-custom" onclick="customAdd(${i})">➕ Custom</button>
                </div>
            </div>`;
        });
        document.getElementById('friend-list').innerHTML = html;
        document.getElementById('logs').innerHTML = state.logs.map(l => `<div style="margin-bottom:5px;">${l}</div>`).join('') || "No activity yet...";
        localStorage.setItem('mumbaiTripDataV4', JSON.stringify(state));
    }

    function runFutureCalc() {
        const daily = prompt("If one person saves this much daily:", "30");
        const months = prompt("For how many months?", "3");
        
        if (daily && months) {
            const days = months * 30;
            const perPerson = daily * days;
            const groupTotal = perPerson * 4;
            
            alert(`📈 PLAN RESULTS:\n\n` +
                  `Per Person: ₹${perPerson.toLocaleString()}\n` +
                  `Total for 4 Friends: ₹${groupTotal.toLocaleString()}\n\n` +
                  `That's enough for a great trip!`);
        }
    }

    function addMoney(i, amt) {
        state.friends[i].paid += Number(amt);
        state.logs.unshift(`✅ ${state.friends[i].name} added ₹${amt}`);
        if(state.logs.length > 20) state.logs.pop();
        render();
    }

    function customAdd(i) {
        const val = prompt(`Enter custom amount for ${state.friends[i].name}:`);
        if (val && !isNaN(val)) addMoney(i, val);
    }

    function logExpense() {
        const amt = prompt("Amount spent:");
        const reason = prompt("For what?");
        if (amt && reason) {
            state.spent += Number(amt);
            state.logs.unshift(`💸 SPENT: ₹${amt} for ${reason}`);
            render();
        }
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(state)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `Mumbai_Backup_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    function importData(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            state = JSON.parse(event.target.result);
            render();
            alert("Data Loaded!");
        };
        reader.readAsText(e.target.files[0]);
    }

    render();
</script>
</body>
</html>

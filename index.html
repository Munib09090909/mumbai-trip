<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Elite 2026 | Ludo Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161c2d; --primary: #38bdf8; --success: #4ade80; --danger: #f87171; --text: #f8fafc; --accent: #818cf8; --ludo-red: #ff4757; --ludo-blue: #1e90ff; --ludo-green: #2ed573; --ludo-yellow: #ffa502; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; overflow-x: hidden; }
        .container { max-width: 450px; margin: auto; }
        
        /* Original Styles Kept */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .days-box { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #334155; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #2d3748; margin: 15px 0; }
        .card { background: var(--card); padding: 16px; margin-bottom: 12px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        
        /* New Game Buttons */
        .game-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn-game { background: var(--card); border: 1px solid var(--accent); padding: 15px; border-radius: 15px; color: white; cursor: pointer; text-align: center; }
        .btn-ludo { background: linear-gradient(45deg, var(--ludo-red), var(--ludo-blue)); border: none; font-weight: bold; }

        /* Ludo Board Styles */
        #ludo-container { display: none; flex-direction: column; align-items: center; background: #fff; padding: 10px; border-radius: 10px; color: #000; }
        .ludo-board { width: 320px; height: 320px; border: 2px solid #333; display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); position: relative; background: #eee; }
        .cell { border: 0.1px solid #ccc; }
        .dice-area { margin-top: 20px; display: flex; gap: 20px; align-items: center; }
        .dice { width: 50px; height: 50px; background: white; border: 2px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; transition: transform 0.5s; }
        .dice.rolling { animation: roll 0.5s infinite; }
        @keyframes roll { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }

        /* Modal / Overlay */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; border: 1px solid #334155; text-align: center; }

        .btn-share { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: #25D366; color: white; padding: 15px; border-radius: 15px; border:none; z-index: 100; font-weight:bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">🚢 Mumbai Elite</h2>
        <button onclick="checkPass('settings')" style="background:#1e293b; color:white; padding:8px 12px; border-radius:10px; border:1px solid #334155;">⚙️ Admin</button>
    </div>

    <div class="days-box">
        <span style="font-size: 2.2em; font-weight: 800; color: var(--primary);" id="days-left">0</span><br>
        <span style="opacity: 0.6; font-size: 0.7em;">DAYS TILL DIWALI</span>
    </div>

    <div class="stat-card">
        <small style="opacity:0.6;">TOTAL SAVED</small>
        <span id="total-val" style="display:block; font-size:2em; font-weight:bold; color:var(--primary);">₹0</span>
    </div>

    <div class="game-menu">
        <button class="btn-game btn-ludo" onclick="startLudoMatchmaking()">🎲 PLAY LUDO (LIVE)</button>
        <button class="btn-game" onclick="alert('Lucky Spin coming soon!')">🎡 LUCKY SPIN</button>
    </div>

    <button style="background:var(--success); color:white; width:100%; padding:15px; border-radius:15px; border:none; font-weight:bold; margin-bottom:20px;" onclick="checkPass('found')">✨ Add Group Fund</button>
    
    <div id="friend-list"></div>
    <canvas id="chart" style="margin-top:20px; background:var(--card); border-radius:15px; padding:10px;"></canvas>
</div>

<div class="modal" id="ludoModal">
    <div class="modal-content" style="max-width: 400px; background: #fff; color: #000;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <b id="turn-indicator">Waiting for players...</b>
            <button onclick="closeLudo()" style="background:red; color:white; padding:5px 10px; border-radius:5px;">Exit</button>
        </div>
        
        <div id="ludo-board-ui" class="ludo-board">
            </div>

        <div class="dice-area">
            <div id="dice" class="dice">1</div>
            <button id="roll-btn" onclick="rollLudoDice()" style="background:var(--ludo-blue); color:white; padding:12px 25px; border-radius:10px;">ROLL</button>
        </div>
    </div>
</div>

<button class="btn-share" onclick="whatsappCommunityShare()">📲 Share Live Status</button>

<script>
    // CORE APP LOGIC (Kept from original)
    const API_URL = "https://script.google.com/macros/s/AKfycbzJwspa9tNV3D2mPwxN7JNRFmI0SbjKE9-VltIBKznochvAK59QADkbweQXEWyUezgS0w/exec";
    const ADMIN_PASS = "1234";
    const START_DATE = new Date("March 24, 2026");
    const DIWALI_DATE = new Date("November 8, 2026");

    let appData = { friends: [], groupExtra: 0, dailyGoal: 20, history: [], ludoSession: null };
    let isAdmin = localStorage.getItem('isMumbaiAdmin') === 'true';

    async function syncData() {
        try {
            const res = await fetch(API_URL);
            const cloud = await res.json();
            if (cloud.friends) appData = cloud;
            
            // Check if someone invited you to Ludo
            if (appData.ludoSession && appData.ludoSession.status === 'inviting' && !window.inLudo) {
                if (confirm(`${appData.ludoSession.host} wants to play Ludo! Join?`)) {
                    joinLudo();
                }
            }
            renderUI();
        } catch (e) { renderUI(); }
    }

    // LUDO MULTIPLAYER LOGIC
    window.inLudo = false;
    let myColor = null;

    async function startLudoMatchmaking() {
        const name = prompt("Enter your name to host:");
        if (!name) return;
        appData.ludoSession = {
            host: name,
            status: 'inviting',
            players: [{ name: name, color: 'red' }],
            turn: 0,
            boardState: {} 
        };
        window.inLudo = true;
        myColor = 'red';
        document.getElementById('ludoModal').style.display = 'flex';
        await saveToCloud();
    }

    async function joinLudo() {
        const name = prompt("Enter your name to join:");
        if (!name) return;
        const colors = ['blue', 'green', 'yellow'];
        const assignedColor = colors[appData.ludoSession.players.length - 1];
        appData.ludoSession.players.push({ name: name, color: assignedColor });
        
        if (appData.ludoSession.players.length >= 2) appData.ludoSession.status = 'playing';
        
        window.inLudo = true;
        myColor = assignedColor;
        document.getElementById('ludoModal').style.display = 'flex';
        await saveToCloud();
    }

    function rollLudoDice() {
        const diceEl = document.getElementById('dice');
        diceEl.classList.add('rolling');
        setTimeout(async () => {
            const val = Math.floor(Math.random() * 6) + 1;
            diceEl.classList.remove('rolling');
            diceEl.innerText = val;
            
            // AUTO-RUN LOGIC: If only 1 piece is active, move it automatically
            // (Simplified for this integration)
            appData.ludoSession.lastRoll = val;
            appData.ludoSession.turn = (appData.ludoSession.turn + 1) % appData.ludoSession.players.length;
            await saveToCloud();
        }, 600);
    }

    function closeLudo() {
        window.inLudo = false;
        appData.ludoSession = null;
        document.getElementById('ludoModal').style.display = 'none';
        saveToCloud();
    }

    // ORIGINAL HELPER FUNCTIONS
    function getDays(f, t) {
        let count = 0, cur = new Date(f);
        while (cur <= t) { if (cur.getDay() !== 0) count++; cur.setDate(cur.getDate() + 1); }
        return count;
    }

    function renderUI() {
        const today = new Date();
        const should = getDays(START_DATE, today) * appData.dailyGoal;
        const total = appData.friends.reduce((s,f) => s + f.paid, 0) + appData.groupExtra;
        
        document.getElementById('days-left').innerText = getDays(today, DIWALI_DATE);
        document.getElementById('total-val').innerText = "₹" + total.toLocaleString();

        let html = "";
        appData.friends.forEach((f, i) => {
            const diff = f.paid - should;
            const color = diff < 0 ? 'var(--danger)' : 'var(--success)';
            html += `<div class="card">
                <div><b>${f.name}</b><br><small style="color:${color}">${diff < 0 ? 'Owes' : 'Extra'} ₹${Math.abs(diff)}</small></div>
                <div><button class="btn-add" onclick="checkPass('add', ${i})">+₹20</button></div>
            </div>`;
        });
        document.getElementById('friend-list').innerHTML = html;
        drawChart();
    }

    async function saveToCloud() {
        await fetch(API_URL, { method: 'POST', body: JSON.stringify(appData) });
        renderUI();
    }

    function checkPass(act, i) {
        if (isAdmin) { execute(act, i); return; }
        if (prompt("Admin Pass:") === ADMIN_PASS) { isAdmin = true; localStorage.setItem('isMumbaiAdmin', 'true'); execute(act, i); }
    }

    function execute(act, i) {
        if (act === 'add') { appData.friends[i].paid += 20; saveToCloud(); }
    }

    function drawChart() {
        const ctx = document.getElementById('chart').getContext('2d');
        if (window.mChart) window.mChart.destroy();
        window.mChart = new Chart(ctx, { type: 'bar', data: { labels: appData.friends.map(f=>f.name), datasets: [{ data: appData.friends.map(f=>f.paid), backgroundColor: '#38bdf8' }] }, options: { plugins: { legend: { display: false } } } });
    }

    setInterval(syncData, 5000); // Check for Ludo Invites every 5 seconds
    syncData();
</script>
</body>
</html>

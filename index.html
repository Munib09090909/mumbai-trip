<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Elite 2026 | Master</title>
    <style>
        :root { --bg: #050810; --card: #111827; --primary: #00d2ff; --accent: #9d50bb; --success: #00ff87; --danger: #ff416c; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; }
        
        /* Header & Progress */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .progress-box { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #ffffff10; margin-bottom: 20px; }
        .p-track { background: #1f2937; height: 12px; border-radius: 10px; margin: 15px 0; position: relative; }
        .p-fill { background: linear-gradient(90deg, var(--primary), var(--accent)); height: 100%; border-radius: 10px; width: 0%; transition: 1.5s; position: relative; }
        .train { position: absolute; right: -15px; top: -10px; font-size: 1.4em; text-shadow: 0 0 10px var(--primary); }

        /* Stats Grid */
        .main-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 20px; border: 1px solid #ffffff10; text-align: center; }
        .stat-card h2 { margin: 5px 0; color: var(--primary); font-size: 1.6em; text-shadow: 0 0 8px var(--primary); }

        /* Buttons */
        .btn-fund { background: var(--success); color: #000; width: 100%; padding: 14px; border-radius: 15px; margin-bottom: 15px; font-weight: 800; border:none; cursor: pointer; }
        .btn-action { padding: 8px 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; color: white; font-size: 0.8em; margin-left: 5px; }
        .btn-plus { background: var(--primary); }
        .btn-custom { background: var(--accent); }

        /* Friend Cards */
        .friend-card { background: var(--card); padding: 15px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #ffffff10; display: flex; justify-content: space-between; align-items: center; }
        .friend-info b { font-size: 1.1em; display: block; }
        .friend-info small { color: #6b7280; font-size: 0.75em; }
        .status-tag { font-size: 0.7em; padding: 2px 6px; border-radius: 5px; font-weight: bold; margin-top: 4px; display: inline-block; }
        
        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: var(--card); padding: 25px; border-radius: 30px; border: 1px solid var(--primary); width: 85%; max-width: 380px; }
        input { background: #0b0f1a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 10px; width: 100%; margin: 10px 0; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; background:linear-gradient(to right, #00d2ff, #9d50bb); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">MUMBAI ELITE 2026</h2>
        <button onclick="checkPass('settings')" style="background:none; border:none; font-size:1.5em; cursor:pointer;">⚙️</button>
    </div>

    <div class="progress-box">
        <div style="display:flex; justify-content:space-between; font-size:0.75em; font-weight:bold; color:var(--primary);">
            <span>START: KHAMBHAT</span>
            <span id="expected-label">EXPECTED: ₹...</span>
        </div>
        <div class="p-track"><div class="p-fill" id="p-bar"><span class="train">🚂</span></div></div>
        <div style="text-align:center; font-size:0.7em; opacity:0.6;" id="p-label">Calculation Live...</div>
    </div>

    <div class="main-stats">
        <div class="stat-card"><small>TOTAL SAVED</small><h2 id="total-val">₹0</h2></div>
        <div class="stat-card"><small>DAYS LEFT</small><h2 id="days-left">0</h2></div>
    </div>

    <button class="btn-fund" onclick="checkPass('found')">✨ ADD GROUP FOUND FUND</button>

    <div id="friend-list"></div>
</div>

<div class="modal" id="adminModal">
    <div class="modal-content">
        <h3 style="text-align:center;">⚙️ ADMIN PANEL</h3>
        <label style="font-size:0.8em; opacity:0.7;">Daily Goal Per Person (₹):</label>
        <input type="number" id="daily-inp" onchange="updateDaily(this.value)">
        <hr style="opacity:0.1; margin:15px 0;">
        <div id="admin-list"></div>
        <button class="btn-fund" style="margin-top:20px;" onclick="exportData()">💾 BACKUP DATA</button>
        <button class="btn-fund" style="background:var(--danger);" onclick="closeModal('adminModal')">CLOSE & SYNC</button>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzJwspa9tNV3D2mPwxN7JNRFmI0SbjKE9-VltIBKznochvAK59QADkbweQXEWyUezgS0w/exec";
const ADMIN_PASS = "1234";
const START_DATE = new Date("2026-03-24");
const DIWALI_DATE = new Date("2026-11-08");

let state = {
    friends: [
        {name: "Munib", paid: 0}, {name: "Nadim", paid: 0}, 
        {name: "Ruhan", paid: 0}, {name: "Friend 4", paid: 0}
    ],
    groupExtra: 0,
    dailyGoal: 20
};

// Calculate how many non-Sundays have passed until today
function getExpectedPerPerson() {
    let today = new Date();
    if (today < START_DATE) return 0;
    let count = 0;
    let cur = new Date(START_DATE);
    while(cur <= today && cur <= DIWALI_DATE) {
        if(cur.getDay() !== 0) count++;
        cur.setDate(cur.getDate() + 1);
    }
    return count * (state.dailyGoal || 20);
}

async function sync() {
    try {
        const res = await fetch(API_URL);
        const cloud = await res.json();
        if(cloud.friends) state = cloud;
        render();
    } catch(e) { render(); }
}

async function save() {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(state) });
    render();
}

function render() {
    const expected = getExpectedPerPerson();
    const total = state.friends.reduce((s,f) => s + (f.paid || 0), 0) + (state.groupExtra || 0);
    const groupExpected = expected * state.friends.length;
    const perc = Math.min((total / groupExpected) * 100, 100).toFixed(1);
    
    document.getElementById('expected-label').innerText = "EXPECTED: ₹" + expected.toLocaleString();
    document.getElementById('total-val').innerText = "₹" + total.toLocaleString();
    document.getElementById('p-bar').style.width = isNaN(perc) ? "0%" : perc + "%";
    document.getElementById('p-label').innerText = `Group is at ${perc}% of current expected target`;
    document.getElementById('daily-inp').value = state.dailyGoal || 20;

    const diffDays = Math.max(0, Math.floor((DIWALI_DATE - new Date())/(1000*60*60*24)));
    document.getElementById('days-left').innerText = diffDays;

    let html = "";
    let aHtml = "";
    state.friends.forEach((f, i) => {
        const personalDiff = (f.paid || 0) - expected;
        const statusClass = personalDiff < 0 ? 'background:rgba(248,113,113,0.2); color:#f87171;' : 'background:rgba(74,222,128,0.2); color:#4ade80;';
        const statusText = personalDiff < 0 ? `Owes ₹${Math.abs(personalDiff)}` : `Extra ₹${personalDiff}`;

        html += `
        <div class="friend-card">
            <div class="friend-info">
                <b>${f.name}</b>
                <div class="status-tag" style="${statusClass}">${statusText}</div>
            </div>
            <div style="text-align:right;">
                <div style="color:var(--primary); font-weight:bold; font-size:1.2em;">₹${f.paid || 0}</div>
                <div style="margin-top:8px;">
                    <button class="btn-action btn-plus" onclick="checkPass('add', ${i})">+₹${state.dailyGoal}</button>
                    <button class="btn-action btn-custom" onclick="checkPass('custom', ${i})">➕ Custom</button>
                </div>
            </div>
        </div>`;
        
        aHtml += `<div style="margin-bottom:10px; display:flex; gap:5px;">
            <input type="text" value="${f.name}" style="flex:2;" onchange="state.friends[${i}].name=this.value">
            <input type="number" value="${f.paid || 0}" style="flex:1;" onchange="state.friends[${i}].paid=Number(this.value)">
        </div>`;
    });
    
    document.getElementById('friend-list').innerHTML = html + `
        <div class="friend-card" style="border:1px dashed var(--success); opacity:0.8;">
            <div class="friend-info"><b>✨ Group Found Fund</b><small>Shared extra money</small></div>
            <div style="color:var(--success); font-weight:bold; font-size:1.2em;">₹${state.groupExtra || 0}</div>
        </div>`;
    document.getElementById('admin-list').innerHTML = aHtml;
}

function checkPass(act, idx) {
    const p = prompt("Enter Admin Password:");
    if(p === ADMIN_PASS) {
        if(act === 'add') { state.friends[idx].paid = (state.friends[idx].paid || 0) + (state.dailyGoal || 20); save(); }
        if(act === 'custom') { 
            let amt = prompt(`Enter custom amount to add for ${state.friends[idx].name}:`);
            if(amt && !isNaN(amt)) { state.friends[idx].paid = (state.friends[idx].paid || 0) + Number(amt); save(); }
        }
        if(act === 'found') { 
            let amt = prompt("How much extra group money found?");
            if(amt && !isNaN(amt)) { state.groupExtra = (state.groupExtra || 0) + Number(amt); save(); }
        }
        if(act === 'settings') openModal('adminModal');
    } else if (p !== null) { alert("Wrong Password!"); }
}

function updateDaily(val) { state.dailyGoal = Number(val); render(); }
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; save(); }

function exportData() {
    const a = document.createElement('a');
    a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
    a.download = `Mumbai_Trip_Backup.json`; a.click();
}

sync();
setInterval(sync, 30000); // Auto-refresh every 30 seconds
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mumbai Trip Saver</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background:#111; color:white; padding:15px; }
        .card { background:#1e1e1e; padding:15px; margin:10px 0; border-radius:15px; border: 1px solid #333; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1em; color: #38bdf8; }
        button { padding:10px; border:none; border-radius:10px; margin:5px 5px 5px 0; cursor: pointer; font-weight: bold; }
        .blue { background:#2196f3; color:white; }
        .green { background:#4caf50; color:white; }
        .red { background:#f44336; color:white; }
        .group-box { border: 1px dashed #4caf50; background: #1a2e1a; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: none; }
    </style>
</head>
<body>

    <h2>🚢 Mumbai Trip 2025</h2>

    <div class="card">
        <div class="stats">
            <span>Goal: ₹25,000</span>
            <span id="days-left">0</span> Days Left
        </div>
        <p style="font-size: 0.8em; opacity: 0.7; margin-top: 5px;">*Sundays are excluded from counting</p>
    </div>

    <div class="card group-box">
        <b>✨ Group Fund (Found Money)</b>
        <div style="font-size: 1.5em; margin: 10px 0;">₹<span id="group-val">0</span></div>
        <button class="green" onclick="addGroupMoney()">+ Add Found Money</button>
    </div>

    <div id="list"></div>

    <div class="card">
        <div style="font-size: 1.2em;">Total Balance: <b>₹<span id="total">0</span></b></div>
        <button class="blue" style="width: 100%; margin-top: 10px;" onclick="share()">📲 Share Sync to WhatsApp</button>
        <button class="red" style="width: 100%; margin-top: 5px; background: none; border: 1px solid #f44336;" onclick="reset()">Reset Everything</button>
    </div>

    <canvas id="chart"></canvas>

<script>
let state = {
    friends: [
        {name: "Munib", paid: 0}, {name: "Nadim", paid: 0}, {name: "Ruhan", paid: 0},
        {name: "Saeid", paid: 0}, {name: "Sahil", paid: 0}
    ],
    groupFund: 0,
    target: 25000
};

// 1. Logic for counting days (Excluding Sundays)
function calculateDays() {
    const today = new Date();
    const diwali = new Date("October 20, 2025");
    let count = 0;
    let cur = new Date(today);
    while (cur <= diwali) {
        if (cur.getDay() !== 0) count++; // Skip Sunday
        cur.setDate(cur.getDate() + 1);
    }
    document.getElementById('days-left').innerText = count;
}

// 2. Main Render Function
function render() {
    let html = "";
    state.friends.forEach((f, i) => {
        html += `
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <b>${f.name}</b> <span>₹${f.paid}</span>
            </div>
            <button class="blue" onclick="addMoney(${i})">+ ₹20</button>
        </div>`;
    });
    document.getElementById('list').innerHTML = html;

    const total = state.friends.reduce((s, f) => s + f.paid, 0) + state.groupFund;
    document.getElementById('total').innerText = total;
    document.getElementById('group-val').innerText = state.groupFund;

    updateChart();
    localStorage.setItem('mumbaiData', JSON.stringify(state));
}

function addMoney(i) {
    state.friends[i].paid += 20;
    render();
}

function addGroupMoney() {
    let amt = prompt("How much found money are you adding?");
    if(amt && !isNaN(amt)) {
        state.groupFund += Number(amt);
        render();
    }
}

function share() {
    const data = btoa(JSON.stringify(state));
    const url = window.location.href.split('?')[0] + '?data=' + data;
    window.open("https://wa.me/?text=" + encodeURIComponent("Mumbai Trip Sync: " + url));
}

function reset() {
    if(confirm("Delete all savings?")) {
        localStorage.clear();
        location.reload();
    }
}

// Chart Logic
function updateChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if (window.mChart) window.mChart.destroy();
    window.mChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: state.friends.map(f => f.name),
            datasets: [{ label: 'Savings', data: state.friends.map(f => f.paid), backgroundColor: '#2196f3' }]
        },
        options: { scales: { y: { beginAtZero: true } } }
    });
}

// Sync from Link
const params = new URLSearchParams(window.location.search);
if (params.get('data')) {
    state = JSON.parse(atob(params.get('data')));
} else {
    const saved = localStorage.getItem('mumbaiData');
    if (saved) state = JSON.parse(saved);
}

calculateDays();
render();
</script>
</body>
</html>

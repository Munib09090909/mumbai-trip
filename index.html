<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Elite | Pro Gaming Hub</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #38bdf8; --accent: #c084fc; --success: #22c55e; --danger: #ef4444; --gold: #fde047; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; overflow-x: hidden; }
        
        /* High-End Header */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(30, 41, 59, 0.5); border-radius: 20px; border: 1px solid #ffffff10; margin-bottom: 20px; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #ffffff10; }
        .stat-box h3 { margin: 5px 0; color: var(--primary); font-size: 1.4em; }

        /* Game Center Grid */
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .game-card { background: var(--card); border-radius: 20px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; border: 1px solid #ffffff10; cursor: pointer; transition: 0.3s; overflow: hidden; }
        .game-card:active { transform: scale(0.95); }
        .game-card.wide { grid-column: span 2; height: 120px; }
        .game-card img { width: 60px; height: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--primary)); }
        .game-card b { font-size: 0.9em; }

        /* Lobby / Player Selection */
        .lobby-box { padding: 20px; text-align: center; }
        .player-count-btns { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .p-btn { width: 50px; height: 50px; border-radius: 12px; border: 2px solid #ffffff20; background: none; color: white; font-weight: bold; cursor: pointer; }
        .p-btn.active { border-color: var(--primary); background: rgba(56, 189, 248, 0.2); }

        /* Mystery Card 4-Grid */
        .card-spread { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .m-card { height: 140px; background: linear-gradient(135deg, #312e81, #1e1b4b); border-radius: 15px; border: 2px solid var(--accent); position: relative; perspective: 1000px; transform-style: preserve-3d; transition: 0.6s; }
        .m-card.flip { transform: rotateY(180deg); }

        /* Spin Wheel */
        .wheel-container { position: relative; width: 250px; height: 250px; margin: 20px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #334155; position: relative; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(var(--danger) 0 90deg, var(--primary) 90deg 180deg, var(--success) 180deg 270deg, var(--gold) 270deg 360deg); }
        .wheel-pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid white; z-index: 10; }

        /* Board Games */
        .board-container { width: 340px; height: 340px; margin: auto; background: #0f172a; border: 4px solid #334155; display: grid; grid-template-columns: repeat(10, 1fr); gap: 1px; }
        .cell { background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 0.6em; position: relative; }
        .piece { width: 15px; height: 15px; border-radius: 50%; border: 2px solid white; position: absolute; z-index: 5; transition: 0.5s; }

        /* General Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 1000; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-main { background: var(--primary); color: #000; padding: 15px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; width: 90%; margin: 20px auto; }
    </style>
</head>
<body>

<div class="header">
    <div><small>EXPECTED</small><br><b id="exp-val">₹...</b></div>
    <h2 style="margin:0; font-size: 1.2em; color: var(--accent);">MUMBAI ELITE</h2>
    <button onclick="checkPass('settings')" style="background:none; border:none; font-size:1.5em; cursor:pointer;">⚙️</button>
</div>

<div class="stats-row">
    <div class="stat-box"><small>TOTAL SAVED</small><h3 id="total-val">₹0</h3></div>
    <div class="stat-box"><small>DAYS LEFT</small><h3 id="days-left">0</h3></div>
</div>

<div class="game-grid">
    <div class="game-card" onclick="openLobby('spin')">
        <img src="https://img.icons8.com/fluency/96/fortune-wheel.png">
        <b>LUCKY SPIN</b>
    </div>
    <div class="game-card" onclick="openLobby('cards')">
        <img src="https://img.icons8.com/fluency/96/playing-cards.png">
        <b>MYSTERY CARDS</b>
    </div>
    <div class="game-card wide" onclick="openLobby('ludo')">
        <img src="https://img.icons8.com/fluency/96/board-game.png">
        <b>MULTIPLAYER LUDO</b>
    </div>
    <div class="game-card wide" onclick="openLobby('snake')">
        <img src="https://img.icons8.com/fluency/96/snake.png">
        <b>SNAKE & LADDERS</b>
    </div>
</div>

<button class="btn-main" style="background:var(--success); margin-top:0;" onclick="checkPass('found')">✨ ADD GROUP FOUND FUND</button>

<div id="friend-list"></div>

<div class="modal" id="lobbyModal">
    <div class="modal-header"><h3>GAME LOBBY</h3><button onclick="closeModal('lobbyModal')">❌</button></div>
    <div class="lobby-box">
        <h4 id="lobby-game-name">Game Name</h4>
        <p>Choose Number of Players:</p>
        <div class="player-count-btns">
            <button class="p-btn" onclick="setPlayers(2)">2</button>
            <button class="p-btn active" onclick="setPlayers(3)">3</button>
            <button class="p-btn" onclick="setPlayers(4)">4</button>
        </div>
        <div id="online-check" style="margin-top:30px; opacity:0.6;">Checking Friends Online...</div>
        <button class="btn-main" id="start-btn" onclick="startGame()">START SESSION</button>
    </div>
</div>

<div class="modal" id="spinModal">
    <div class="modal-header"><h3>LUCKY WHEEL</h3><button onclick="closeModal('spinModal')">❌</button></div>
    <div class="wheel-container">
        <div class="wheel-pointer"></div>
        <div class="wheel" id="wheel-obj"></div>
    </div>
    <button class="btn-main" onclick="spinNow()">SPIN WHEEL</button>
</div>

<div class="modal" id="cardModal">
    <div class="modal-header"><h3>CHOOSE 1 OF 4</h3><button onclick="closeModal('cardModal')">❌</button></div>
    <div class="card-spread">
        <div class="m-card" onclick="flipCard(this)"></div>
        <div class="m-card" onclick="flipCard(this)"></div>
        <div class="m-card" onclick="flipCard(this)"></div>
        <div class="m-card" onclick="flipCard(this)"></div>
    </div>
</div>

<script>
const API_URL = "YOUR_APPS_SCRIPT_URL";
const ADMIN_PASS = "1234";
let state = { friends: [], groupExtra: 0, dailyGoal: 20 };
let currentGame = '';
let playerCount = 3;

// --- CORE SYNC ---
async function sync() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        if(data.friends) state = data;
        render();
    } catch(e) { console.error("Sync Error"); }
}

function render() {
    const exp = calculateExpected();
    document.getElementById('exp-val').innerText = "₹" + exp;
    document.getElementById('total-val').innerText = "₹" + state.friends.reduce((s,f)=>s+(f.paid||0),0);
    
    let html = "";
    state.friends.forEach((f, i) => {
        html += `<div class="stat-box" style="margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
            <div style="text-align:left;"><b>${f.name}</b><br><small>Paid: ₹${f.paid||0}</small></div>
            <button onclick="checkPass('add',${i})" style="background:var(--primary); border:none; padding:8px 15px; border-radius:10px; font-weight:bold;">+₹20</button>
        </div>`;
    });
    document.getElementById('friend-list').innerHTML = html;
}

function calculateExpected() {
    let start = new Date("2026-03-24"), count = 0, cur = new Date();
    while(start <= cur) { if(start.getDay()!==0) count++; start.setDate(start.getDate()+1); }
    return count * state.dailyGoal;
}

// --- LOBBY LOGIC ---
function openLobby(game) {
    currentGame = game;
    document.getElementById('lobby-game-name').innerText = game.toUpperCase();
    document.getElementById('lobbyModal').style.display = 'flex';
}

function setPlayers(n) {
    playerCount = n;
    document.querySelectorAll('.p-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

function startGame() {
    closeModal('lobbyModal');
    if(currentGame === 'spin') openModal('spinModal');
    if(currentGame === 'cards') openModal('cardModal');
}

// --- SPIN LOGIC ---
let isSpinning = false;
function spinNow() {
    if(isSpinning) return;
    isSpinning = true;
    const deg = 1800 + Math.floor(Math.random() * 360);
    document.getElementById('wheel-obj').style.transform = `rotate(${deg}deg)`;
    setTimeout(() => {
        alert("🎉 You won a bonus ₹20 for your savings!");
        isSpinning = false;
    }, 4000);
}

// --- CARD LOGIC ---
function flipCard(el) {
    if(el.classList.contains('flip')) return;
    el.classList.add('flip');
    el.innerHTML = `<div style="transform:rotateY(180deg); display:flex; align-items:center; justify-content:center; height:100%; font-weight:bold; font-size:1.5em; color:var(--gold);">₹50</div>`;
    setTimeout(() => alert("Extra ₹50 Added!"), 500);
}

function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

sync();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mumbai Trip 2026 | Games & Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161c2d; --primary: #38bdf8; --success: #4ade80; --danger: #f87171; --text: #f8fafc; --accent: #818cf8; --gold: #fbbf24; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .container { max-width: 450px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .settings-btn { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 12px; cursor: pointer; }
        
        /* Main Stats */
        .days-box { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; border: 1px solid #334155; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 18px; text-align: center; border: 1px solid #2d3748; margin-bottom: 15px; }
        .card { background: var(--card); padding: 16px; margin-bottom: 12px; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2d3748; }
        
        /* Game Buttons */
        .btn-zone { background: linear-gradient(45deg, #f43f5e, #fbbf24); color: white; width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; border: none; cursor: pointer; font-size: 1.1em; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(244, 63, 94, 0.4); }
        .btn-add { background: var(--primary); color: white; padding: 10px 15px; margin-left: 5px; border-radius: 12px; }
        .btn-group { background: var(--success); color: white; width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 20px; border:none; font-weight: bold; }

        /* Game Zone Overlay */
        .game-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .game-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .game-card { background: var(--card); padding: 20px; border-radius: 20px; text-align: center; border: 1px solid #334155; cursor: pointer; transition: 0.2s; }
        .game-card:active { transform: scale(0.95); }
        
        /* Board Game UI */
        .board { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #1e293b; padding: 10px; border-radius: 12px; margin-bottom: 20px; }
        .cell { height: 55px; background: #2d3748; border-radius: 5px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 0.8em; }
        .player-dot { width: 12px; height: 12px; border-radius: 50%; position: absolute; border: 2px solid white; z-index: 5; }
        
        /* Modals */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; width: 85%; max-width: 380px; border: 1px solid #334155; text-align: center; }
        input { background: #0b0f1a; border: 1px solid #334155; color: white; padding: 10px; border-radius: 8px; width: 100%; margin: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">🚢 Mumbai Live</h2>
        <button class="settings-btn" onclick="checkPass('settings')">⚙️ Admin</button>
    </div>

    <div class="days-box">
        <span style="font-size: 2.5em; font-weight: 800; color: var(--primary);" id="days-left">0</span><br>
        <span style="opacity: 0.6; text-transform: uppercase; font-size: 0.7em;">Days Left till Diwali</span>
    </div>

    <div class="stat-card">
        <small style="opacity:0.6;">TOTAL GROUP SAVINGS</small>
        <span id="total-val" style="display:block; font-size:2.2em; font-weight:bold; color:var(--primary);">₹0</span>
    </div>

    <button class="btn-zone" onclick="openGameZone()">🎮 PLAY GAMES (FUN ZONE)</button>
    
    <button class="btn-group" onclick="checkPass('found')">✨ Add Found Money</button>

    <div id="friend-list"></div>
    <canvas id="chart" style="margin-top:20px; background:var(--card); border-radius:20px; padding:10px;"></canvas>
</div>

<div class="game-overlay" id="gameZone">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="margin:0;">🕹️ Entertainment Zone</h2>
        <button onclick="closeGameZone()" style="background:var(--danger); color:white; border:none; padding:8px 15px; border-radius:8px;">Exit</button>
    </div>

    <div id="game-list-menu" class="game-grid">
        <div class="game-card" onclick="startSaapSidi()">🐍<br>Saap Sidi</div>
        <div class="game-card" onclick="startTapWar()">🥊<br>Tap War</div>
        <div class="game-card" onclick="startDiceRace()">🎲<br>Dice Race</div>
        <div class="game-card" onclick="startCoinFlip()">🪙<br>Coin Flip</div>
        <div class="game-card" onclick="startRPS()">✂️<br>R.P.S</div>
        <div class="game-card" onclick="startNumberGuess()">🔢<br>Mind Read</div>
    </div>

    <div id="saap-sidi-view" style="display:none; margin-top:20px;">
        <div class="board" id="ss-board"></div>
        <div id="ss-turn" style="text-align:center; margin-bottom:10px; font-weight:bold; color:#ef4444;">Red's Turn</div>
        <button class="btn-group" onclick="rollSS()">🎲 ROLL DICE</button>
        <button onclick="backToMenu()" style="width:100%; background:none; color:white; border:none;">Back to Menu</button>
    </div>

    <div id="tap-war-view" style="display:none; height:80vh;">
        <div id="p1-tap" style="height:50%; background:#ef4444; display:flex; align-items:center; justify-content:center; font-size:2em;" onclick="countTap(1)">P1: 0</div>
        <div id="p2-tap" style="height:50%; background:#3b82f6; display:flex; align-items:center; justify-content:center; font-size:2em;" onclick="countTap(2)">P2: 0</div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content" style="text-align:left;">
        <h3>⚙️ Admin Panel</h3>
        <div id="manage-friends-list"></div>
        <button class="btn-group" onclick="closeModal('settingsModal')">Save & Sync</button>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzJwspa9tNV3D2mPwxN7JNRFmI0SbjKE9-VltIBKznochvAK59QADkbweQXEWyUezgS0w/exec";
const ADMIN_PASS = "1234";
const START = new Date("March 24, 2026");
const DIWALI = new Date("November 8, 2026");

let data = { friends: [], groupExtra: 0, dailyGoal: 20, history: [] };
let isAdmin = localStorage.getItem('isMumbaiAdmin') === 'true';

// --- CORE LOGIC ---
async function sync() {
    try {
        const res = await fetch(API_URL);
        const cloud = await res.json();
        if(cloud.friends) data = cloud;
        render();
    } catch(e) { render(); }
}

async function save() {
    await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
    render();
}

function render() {
    const today = new Date();
    const should = Math.floor((today - START) / (1000*60*60*24)) * data.dailyGoal;
    document.getElementById('days-left').innerText = Math.max(0, Math.floor((DIWALI - today) / (1000*60*60*24)));
    
    let html = "";
    data.friends.forEach((f, i) => {
        const diff = f.paid - should;
        html += `<div class="card">
            <div><b>${f.name}</b> <br> ₹${f.paid}</div>
            <button class="btn-add" onclick="checkPass('add', ${i})">${isAdmin ? '+₹20' : '🔒'}</button>
        </div>`;
    });
    document.getElementById('friend-list').innerHTML = html;
    document.getElementById('total-val').innerText = "₹" + (data.friends.reduce((s,f)=>s+f.paid,0)+data.groupExtra).toLocaleString();
    updateChart();
}

function checkPass(act, idx) {
    if(isAdmin || prompt("Pass:") === ADMIN_PASS) {
        isAdmin = true; localStorage.setItem('isMumbaiAdmin', 'true');
        if(act === 'add') { data.friends[idx].paid += 20; save(); }
        if(act === 'settings') openModal('settingsModal');
    }
}

// --- GAME LOGIC ---
function openGameZone() { document.getElementById('gameZone').style.display = 'flex'; }
function closeGameZone() { document.getElementById('gameZone').style.display = 'none'; }
function backToMenu() {
    document.getElementById('game-list-menu').style.display = 'grid';
    document.getElementById('saap-sidi-view').style.display = 'none';
    document.getElementById('tap-war-view').style.display = 'none';
}

// Saap Sidi (Snakes & Ladders)
let ss_players = [{p:0, c:'#ef4444'}, {p:0, c:'#3b82f6'}, {p:0, c:'#22c55e'}, {p:0, c:'#eab308'}];
let ss_turn = 0;

function startSaapSidi() {
    document.getElementById('game-list-menu').style.display = 'none';
    document.getElementById('saap-sidi-view').style.display = 'block';
    const board = document.getElementById('ss-board');
    board.innerHTML = "";
    for(let i=25; i>=1; i--) board.innerHTML += `<div class="cell" id="c-${i}">${i}</div>`;
    updateSS();
}

function rollSS() {
    let roll = Math.floor(Math.random() * 6) + 1;
    let p = ss_players[ss_turn];
    p.p += roll;
    if(p.p === 3) p.p = 11; // Ladder
    if(p.p === 15) p.p = 5;  // Snake
    if(p.p >= 25) { alert("WINNER!"); p.p = 25; }
    ss_turn = (ss_turn + 1) % 4;
    document.getElementById('ss-turn').innerText = ["Red", "Blue", "Green", "Yellow"][ss_turn] + "'s Turn";
    document.getElementById('ss-turn').style.color = ss_players[ss_turn].c;
    updateSS();
}

function updateSS() {
    document.querySelectorAll('.player-dot').forEach(d => d.remove());
    ss_players.forEach((p, i) => {
        if(p.p > 0) {
            const dot = `<div class="player-dot" style="background:${p.c}; left:${i*5}px"></div>`;
            document.getElementById('c-'+p.p).innerHTML += dot;
        }
    });
}

// Tap War
let t1=0, t2=0;
function startTapWar() {
    document.getElementById('game-list-menu').style.display = 'none';
    document.getElementById('tap-war-view').style.display = 'block';
    t1=0; t2=0;
}
function countTap(p) {
    if(p===1) t1++; else t2++;
    document.getElementById('p1-tap').innerText = "P1: "+t1;
    document.getElementById('p2-tap').innerText = "P2: "+t2;
    if(t1 >= 50) { alert("P1 Wins!"); backToMenu(); }
    if(t2 >= 50) { alert("P2 Wins!"); backToMenu(); }
}

// Simple Games
function startCoinFlip() { alert(Math.random() > 0.5 ? "🪙 HEADS" : "🪙 TAILS"); }
function startRPS() { const move = ["Rock","Paper","Scissors"][Math.floor(Math.random()*3)]; alert("I choose: " + move); }
function startNumberGuess() { alert("I am thinking of: " + (Math.floor(Math.random()*10)+1)); }
function startDiceRace() { alert("You rolled a " + (Math.floor(Math.random()*6)+1) + "!"); }

// Utils
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }
function updateChart() {
    const ctx = document.getElementById('chart').getContext('2d');
    if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, { type:'bar', data:{ labels:data.friends.map(f=>f.name), datasets:[{data:data.friends.map(f=>f.paid), backgroundColor:'#38bdf8'}]}, options:{plugins:{legend:{display:false}}}});
}

sync();
setInterval(sync, 60000);
</script>
</body>
</html>
